name: Test Suite

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y tcl-dev build-essential zlib1g-dev

    - name: Install Dolt
      run: |
        DOLT_VERSION=1.86.0
        curl -fsSL "https://github.com/dolthub/dolt/releases/download/v${DOLT_VERSION}/dolt-linux-amd64.tar.gz" \
          | sudo tar -xz -C /usr/local --strip-components=1
        dolt version

    - name: Configure
      run: |
        mkdir -p build && cd build
        TCL_CONFIG=$(find /usr -name tclConfig.sh 2>/dev/null | head -1)
        if [ -n "$TCL_CONFIG" ]; then
          ../configure --with-tcl=$(dirname $TCL_CONFIG)
        else
          ../configure
        fi

    - name: Build
      run: |
        cd build
        make doltlite
        make doltlite-lib
        make testfixture
        # Stock SQLite lib for concurrent_branch_test
        make libsqlite3.a USE_AMALGAMATION=0

    # ── Doltlite feature tests ──────────────────────────────

    - name: Doltlite feature tests
      run: cd build && bash ../test/run_doltlite_tests.sh
      timeout-minutes: 20

    - name: Correctness regression tests
      run: cd build && bash ../test/correctness_test.sh ./doltlite
      timeout-minutes: 10

    - name: Index operation tests
      run: cd build && bash ../test/index_test.sh ./doltlite
      timeout-minutes: 5

    - name: Index oracle tests
      run: cd build && bash ../test/index_oracle_test.sh ./doltlite sqlite3
      timeout-minutes: 5

    - name: Version control oracle tests (dolt_log)
      run: cd build && bash ../test/vc_oracle_log_test.sh ./doltlite dolt
      timeout-minutes: 5

    - name: Version control oracle tests (dolt_status)
      run: cd build && bash ../test/vc_oracle_status_test.sh ./doltlite dolt
      timeout-minutes: 5

    - name: Version control oracle tests (dolt_add)
      run: cd build && bash ../test/vc_oracle_add_test.sh ./doltlite dolt
      timeout-minutes: 5

    - name: Version control oracle tests (dolt_branches)
      run: cd build && bash ../test/vc_oracle_branches_test.sh ./doltlite dolt
      timeout-minutes: 5

    - name: Version control oracle tests (dolt_tags)
      run: cd build && bash ../test/vc_oracle_tags_test.sh ./doltlite dolt
      timeout-minutes: 5

    - name: Version control oracle tests (dolt_remotes)
      run: cd build && bash ../test/vc_oracle_remotes_test.sh ./doltlite dolt
      timeout-minutes: 5

    - name: Version control oracle tests (dolt_branch)
      run: cd build && bash ../test/vc_oracle_branch_test.sh ./doltlite dolt
      timeout-minutes: 5

    - name: Version control oracle tests (dolt_merge)
      run: cd build && bash ../test/vc_oracle_merge_test.sh ./doltlite dolt
      timeout-minutes: 5

    - name: Version control oracle tests (dolt_conflicts)
      run: cd build && bash ../test/vc_oracle_conflicts_test.sh ./doltlite dolt
      timeout-minutes: 5

    - name: Version control oracle tests (dolt_reset)
      run: cd build && bash ../test/vc_oracle_reset_test.sh ./doltlite dolt
      timeout-minutes: 5

    - name: Version control oracle tests (dolt_revert / dolt_cherry_pick)
      run: cd build && bash ../test/vc_oracle_revert_cherrypick_test.sh ./doltlite dolt
      timeout-minutes: 5

    - name: Version control oracle tests (dolt_commit)
      run: cd build && bash ../test/vc_oracle_commit_test.sh ./doltlite dolt
      timeout-minutes: 5

    - name: Version control oracle tests (state transitions)
      run: cd build && bash ../test/vc_oracle_state_transitions_test.sh ./doltlite dolt
      timeout-minutes: 5

    - name: Version control oracle tests (dolt_diff_<table>)
      run: cd build && bash ../test/vc_oracle_diff_test.sh ./doltlite dolt
      timeout-minutes: 5

    - name: Large-scale test (10K rows)
      run: cd build && bash ../test/large_scale_test.sh ./doltlite --quick
      timeout-minutes: 5

    - name: Multi-table test
      run: cd build && bash ../test/multi_table_test.sh ./doltlite --quick
      timeout-minutes: 5

    - name: Diff tests
      run: cd build && bash ../test/diff_test.sh ./doltlite
      timeout-minutes: 10

    - name: Config tests
      run: cd build && bash ../test/config_test.sh ./doltlite
      timeout-minutes: 2

    - name: Remote integration tests
      run: cd build && bash ../test/remote_test.sh ./doltlite
      timeout-minutes: 5

    # ── C/Python/Go integration tests ───────────────────────

    - name: C integration tests
      run: |
        cd build
        # Quickstart
        gcc -o quickstart ../examples/quickstart.c -I. libdoltlite.a -lpthread -lz -lm
        ./quickstart
        # Concurrent branch test
        cc -g -O0 -I. -I../src -DDOLTLITE_PROLLY=1 -D_HAVE_SQLITE_CONFIG_H -DBUILD_sqlite \
          -o concurrent_branch_test ../test/concurrent_branch_test.c \
          libsqlite3.a -lz -lpthread -lm
        ./concurrent_branch_test

    - name: Concurrent write test
      run: |
        cd build
        gcc -g -O0 -I. -o concurrent_write_test ../test/concurrent_write_test.c \
          libdoltlite.a -lz -lpthread -lm
        ./concurrent_write_test

    - name: Python integration test
      run: cd build && LD_PRELOAD=./libdoltlite.so python3 ../examples/quickstart.py

    - name: Go integration test
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
    - run: |
        cd examples/go
        CGO_CFLAGS="-I../../build" CGO_LDFLAGS="../../build/libdoltlite.a -lz -lpthread -lm" \
          go build -tags libsqlite3 -o quickstart .
        ./quickstart

    # ── SQLite testfixture tests ────────────────────────────
    #
    # Every upstream sqlite testfixture file we know about is run.
    # Files that have a small number of expected divergences from
    # upstream behavior (because doltlite keys rows by user PK rather
    # than by sqlite's auto-allocated rowid since #358) record those
    # specific test names in test/known_testfixture_divergences.txt
    # and the runner enforces strict equality: any actual failure
    # not on the list is a regression, and any list entry that
    # stops failing is reported as needing removal. This keeps the
    # divergence list honest and lets us catch real bugs in tests
    # that USED to be skipped at the file level.

    - name: SQLite core tests
      run: |
        cd build
        bash ../test/run_testfixture.sh "Core tests" 120 \
          insert select1 select2 select3 select4 delete update \
          trans where expr attach \
          coalesce conflict cse date join subquery view \
          between cast check limit null quote rowid sort types \
          types2 in in2 in3 in4 in5 in6 like like2 \
          minmax minmax2 minmax3 select5 select6 select7 \
          selectA selectB distinctagg enc count capi2 capi3 \
          collate1 collate2 collate3 collate4 \
          index intpkey \
          alter auth savepoint \
          fkey1 fkey2 fkey5 \
          trigger1 trigger2 triggerA triggerB triggerC

    - name: SQLite large tests
      run: |
        cd build
        bash ../test/run_testfixture.sh "Large tests" 180 \
          func e_expr printf date randexpr1 enc4 \
          boundary1 boundary2 boundary3 select9

    - name: SQLite crash recovery tests
      run: |
        cd build
        bash ../test/run_testfixture.sh "Crash recovery" 180 \
          crash crash2 crash3 crash4 crash5 crash6 crash7 crash8 crashM

    - name: SQLite fuzz tests
      run: |
        cd build
        bash ../test/run_testfixture.sh "Fuzz tests" 120 \
          fuzz fuzz2 fuzz3 fuzz4

    - name: SQLite additional tests
      run: |
        cd build
        bash ../test/run_testfixture.sh "Additional tests" 120 \
          window1 window2 window3 \
          json101 json102 json103 json104 json105 \
          aggnested aggorderby \
          affinity2 affinity3 \
          between distinct distinctagg \
          e_createtable e_delete e_insert e_select e_update e_fkey \
          func2 func3 hexlit icu intarray \
          orderby1 orderby2 orderby3 orderby4 \
          pragma pragma2 printf2 \
          schema schema2 schema3 schema4 \
          shared shared2 shared3 \
          speed1 substr table tempdb \
          vacuum vacuum2 \
          tkt-38cb5df375 tkt-9a8b09f8e6 tkt-99378177930f87bd \
          tkt-80e031a00f tkt-80ba201079 tkt-31338dca7e \
          tkt-7bbfb7d442 tkt-4dd95f6943 tkt-2d1a5c67d \
          tkt-f3e5abed55
